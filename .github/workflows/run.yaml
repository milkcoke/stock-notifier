name: Daily Stock Notifier

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 테스트를 위해 수동 실행 버튼 활성화

jobs:
  run-notifier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod tidy

      - name: Run Notifier
        env:
          # GitHub Secrets를 시스템 환경변수로 주입
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER_ID: ${{ secrets.USER_ID }}
        # 패키지가 분리되어 있으므로 현재 폴더(.)의 모든 파일을 빌드/실행
        run: go run .
